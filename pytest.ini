[pytest]
# ── Playwright / pytest конфигурация ─────────────────────────────────────────
#
# THROTTLING NOTE:
#   Сервер блокирует клиентов при > 30 req/s.
#   slow_mo задаётся через --throttle-ms (default: 200 мс).
#   Запуск без флагов уже безопасен.
#
# Запустить все тесты:
#   pytest tests/ -v
#
# Запустить с замедлением (удвоенная пауза):
#   pytest tests/ -v --throttle-ms=400
#
# Запустить в режиме headed (видимый браузер):
#   pytest tests/ -v --headed
#
# ─────────────────────────────────────────────────────────────────────────────

testpaths = tests
pythonpath = .
addopts   = -v --tb=short

markers =
    first_name: тесты поля First Name (Challenge #1)
    dom_manipulation: тесты с манипуляциями DOM / Cookies / JS
