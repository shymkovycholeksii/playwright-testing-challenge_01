[pytest]
# ── Playwright / pytest configuration ─────────────────────────────────────────
#
# THROTTLING NOTE:
#   The server blocks clients at > 30 req/s.
#   slow_mo is set via --throttle-ms (default: 200 ms).
#   Running without flags is already safe.
#
# Run all tests:
#   pytest tests/ -v
#
# Run with throttling (double pause):
#   pytest tests/ -v --throttle-ms=400
#
# Run in headed mode (visible browser):
#   pytest tests/ -v --headed
#
# ─────────────────────────────────────────────────────────────────────────────

testpaths = tests
pythonpath = .
addopts   = -v --tb=short

markers =
    first_name: tests for the First Name field (Challenge #1)
    dom_manipulation: tests with DOM / Cookies / JS manipulations
    challenge2: tests for Challenge #2 (Bypass HTML5 Validation)
    challenge4: tests for Challenge #4 (Generate Testing Data)
    challenge5: tests for Challenge #5 (Web Analytics Engine)
